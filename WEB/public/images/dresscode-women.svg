<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520" fill="none">
  <rect width="400" height="520" rx="8" fill="#FAF8F5"/>
  <rect x="1" y="1" width="398" height="518" rx="7" stroke="#D4AF37" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
  <!-- Dress silhouette -->
  <g transform="translate(200, 180)" opacity="0.2">
    <!-- Head -->
    <circle cx="0" cy="-80" r="20" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Shoulders -->
    <path d="M-30 -55 Q0 -50 30 -55" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Dress body -->
    <path d="M-30 -55 L-25 -20 L-50 80 L50 80 L25 -20 L30 -55" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Belt -->
    <line x1="-28" y1="-15" x2="28" y2="-15" stroke="#D4AF37" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="-15" y1="80" x2="-15" y2="130" stroke="#1A1A1A" stroke-width="1.5"/>
    <line x1="15" y1="80" x2="15" y2="130" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Heels -->
    <path d="M-25 130 L-5 130 L-5 135 L-20 135" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
    <path d="M5 130 L25 130 L25 135 L10 135" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Label -->
  <text x="200" y="420" font-family="Georgia, serif" font-size="16" fill="#D4AF37" text-anchor="middle" letter-spacing="0.15em">ELLA</text>
  <line x1="150" y1="435" x2="250" y2="435" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <text x="200" y="458" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="middle" letter-spacing="0.1em">Reemplazar con foto</text>
</svg>
