<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520" fill="none">
  <rect width="400" height="520" rx="8" fill="#FAF8F5"/>
  <rect x="1" y="1" width="398" height="518" rx="7" stroke="#D4AF37" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
  <!-- Suit silhouette -->
  <g transform="translate(200, 180)" opacity="0.2">
    <!-- Head -->
    <circle cx="0" cy="-80" r="20" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Shoulders -->
    <path d="M-40 -55 L-30 -58 Q0 -52 30 -58 L40 -55" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Blazer -->
    <path d="M-40 -55 L-35 60 L-10 60 L-5 -35 L0 -30 L5 -35 L10 60 L35 60 L40 -55" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Lapels -->
    <path d="M-5 -48 L-15 -25 L-5 -20" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
    <path d="M5 -48 L15 -25 L5 -20" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
    <!-- Pocket square -->
    <rect x="18" y="-15" width="10" height="8" stroke="#D4AF37" stroke-width="1" fill="none"/>
    <!-- Pants -->
    <path d="M-35 60 L-30 130 L-10 130 L-5 65" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <path d="M5 65 L10 130 L30 130 L35 60" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <!-- Shoes -->
    <path d="M-35 130 L-5 130 L-5 135" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
    <path d="M5 130 L35 130 L35 135" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Label -->
  <text x="200" y="420" font-family="Georgia, serif" font-size="16" fill="#D4AF37" text-anchor="middle" letter-spacing="0.15em">EL</text>
  <line x1="150" y1="435" x2="250" y2="435" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <text x="200" y="458" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="middle" letter-spacing="0.1em">Reemplazar con foto</text>
</svg>
